<!DOCTYPE html>
<html>
<head>
  <title>Tienda de Vestidos</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background-color: #fff0f5;
    }
    header {
      background-color: #ff69b4;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      padding: 20px;
    }
    .producto {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
      display: inline-block;
      width: 200px;
      background: white;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
    button {
      background-color: #ff69b4;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>🌸 Boutique de Vestidos</h1>
  <p>Los mejores vestidos para cada ocasión</p>
</header>

<div class="container">

  <div class="producto">
    <img src="https://via.placeholder.com/200" alt="Vestido 1">
    <h3>Vestido Rojo</h3>
    <p>$25</p>
    <button>Comprar</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/200" alt="Vestido 2">
    <h3>Vestido Elegante</h3>
    <p>$40</p>
    <button>Comprar</button>
  </div>

  <div class="producto">
    <img src="https://via.placeholder.com/200" alt="Vestido 3">
    <h3>Vestido Casual</h3>
    <p>$20</p>
    <button>Comprar</button>
  </div>

</div>

</body>
</html>
